{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS_EmployeedData</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <style>
        body {
            background-color: #87CEEB;
            font-family: Arial, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
        }
        
        h1 {
            color: #333;
            text-align: center;
        }
        
        table {
            background-color: white;
            border-collapse: collapse;
            margin: 20px auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border: 1px solid #ddd;
        }
        
        th {
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
        }
        
        tr:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <h1>VS Employee data</h1>
    <table border="2px">
       <thead>
        <th>ID</th>
        <th>name</th>   
        <th>salary</th>
       </thead>
       {% for data in data %}
       <tr>
        <td>{{ data.Emp_id }}</td>
        <td>{{ data.Emp_name }}</td>
        <td>{{ data.Emp_salary }}</td>
       </tr>
       {% endfor %}
    </table>

    
</body>
</html>
